<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="375" height="812" />

  <line x1="0" y1="44" x2="375" y2="44" />
  <line x1="0" y1="778" x2="375" y2="778" />

  <!-- header -->
  <g transform="translate(0,44)">
    <rect x="0" y="0" width="375" height="48" />
    <text x="16" y="30" font-size="14" stroke="none" fill="#000">← PLAN</text>
    <text x="187" y="30" text-anchor="middle" font-size="14" font-weight="600" stroke="none" fill="#000">Comments</text>
    <text x="359" y="30" text-anchor="end" font-size="14" stroke="none" fill="#000">⋯</text>
  </g>

  <!-- filter chips -->
  <g transform="translate(16,108)">
    <rect x="0" y="0" width="72" height="28" rx="14" />
    <text x="36" y="18" text-anchor="middle" font-size="12" stroke="none" fill="#666">Open 1</text>
    <rect x="80" y="0" width="96" height="28" rx="14" fill="#e6e6e6" />
    <text x="128" y="18" text-anchor="middle" font-size="12" stroke="none" fill="#000">Resolved 1</text>
    <rect x="184" y="0" width="80" height="28" rx="14" />
    <text x="224" y="18" text-anchor="middle" font-size="12" stroke="none" fill="#666">Stale 1</text>
    <rect x="272" y="0" width="80" height="28" rx="14" />
    <text x="312" y="18" text-anchor="middle" font-size="12" stroke="none" fill="#666">Orphan 1</text>
  </g>

  <!-- stacked state cards -->
  <g transform="translate(16,156)">
    <!-- open -->
    <rect x="0" y="0" width="343" height="120" rx="6" />
    <rect x="12" y="12" width="319" height="24" fill="#fafafa" stroke="#e6e6e6" />
    <text x="20" y="28" font-size="12" stroke="none" fill="#666">“quote …”</text>
    <rect x="12" y="48" width="56" height="20" rx="10" fill="#000" />
    <text x="40" y="62" text-anchor="middle" font-size="12" stroke="none" fill="#fff">Open</text>
    <text x="80" y="62" font-size="12" stroke="none" fill="#666">rev 4 · 2 replies</text>
    <line x1="12" y1="80" x2="331" y2="80" stroke="#ccc" />
    <text x="12" y="100" font-size="12" stroke="none" fill="#000">Reply</text>
    <text x="120" y="100" font-size="12" stroke="none" fill="#000">Resolve</text>
    <text x="244" y="100" font-size="12" stroke="none" fill="#000">Copy link</text>
  </g>

  <g transform="translate(16,292)">
    <rect x="0" y="0" width="343" height="120" rx="6" fill="#fafafa" />
    <rect x="12" y="12" width="319" height="24" fill="#fff" stroke="#e6e6e6" stroke-dasharray="2 3" />
    <text x="20" y="28" font-size="12" stroke="none" fill="#666">“quote …”</text>
    <rect x="12" y="48" width="72" height="20" rx="10" />
    <text x="48" y="62" text-anchor="middle" font-size="12" stroke="none" fill="#666">Resolved</text>
    <text x="92" y="62" font-size="12" stroke="none" fill="#666">rev 3 → 4</text>
    <line x1="12" y1="80" x2="331" y2="80" stroke="#ccc" />
    <text x="12" y="100" font-size="12" stroke="none" fill="#000">Reopen</text>
    <text x="244" y="100" font-size="12" stroke="none" fill="#000">Copy link</text>
  </g>

  <g transform="translate(16,428)">
    <rect x="0" y="0" width="343" height="120" rx="6" />
    <rect x="12" y="12" width="319" height="24" fill="#fafafa" stroke="#000" stroke-dasharray="2 3" />
    <text x="20" y="28" font-size="12" stroke="none" fill="#666">“fuzzy quote …”</text>
    <rect x="12" y="48" width="56" height="20" rx="10" />
    <text x="40" y="62" text-anchor="middle" font-size="12" stroke="none" fill="#000">Stale</text>
    <text x="80" y="62" font-size="12" stroke="none" fill="#000">⚠ matched fuzzy</text>
    <line x1="12" y1="80" x2="331" y2="80" stroke="#ccc" />
    <text x="12" y="100" font-size="12" stroke="none" fill="#000">Re-anchor</text>
    <text x="120" y="100" font-size="12" stroke="none" fill="#000">Show diff</text>
    <text x="244" y="100" font-size="12" stroke="none" fill="#000">Resolve</text>
  </g>

  <g transform="translate(16,564)">
    <rect x="0" y="0" width="343" height="120" rx="6" />
    <rect x="12" y="12" width="319" height="24" fill="#e6e6e6" stroke="#000" stroke-dasharray="2 3" />
    <text x="20" y="28" font-size="12" stroke="none" fill="#666">“original quote …”</text>
    <rect x="12" y="48" width="80" height="20" rx="10" fill="#e6e6e6" />
    <text x="52" y="62" text-anchor="middle" font-size="12" stroke="none" fill="#000">Orphaned</text>
    <text x="104" y="62" font-size="12" stroke="none" fill="#666">last seen rev 3</text>
    <line x1="12" y1="80" x2="331" y2="80" stroke="#ccc" />
    <text x="12" y="100" font-size="12" stroke="none" fill="#000">View rev 3</text>
    <text x="120" y="100" font-size="12" stroke="none" fill="#000">Resolve</text>
    <text x="244" y="100" font-size="12" stroke="none" fill="#000">Copy link</text>
  </g>

  <!-- footer -->
  <g transform="translate(0,716)">
    <line x1="0" y1="0" x2="375" y2="0" />
    <text x="16" y="22" font-size="12" stroke="none" fill="#666">Filter chips wrap to a second row at 320px. "Show resolved/orphaned" toggles persist per-document.</text>
  </g>

  <!-- callouts -->
  <g stroke="#d33" stroke-dasharray="4 4" fill="none">
    <rect x="8" y="148" width="359" height="544" />
  </g>
</svg>
