# Apply this manifest before enabling the Kubernetes sandbox provider with
# `inCluster: true`. It grants the paperclip-server/plugin ServiceAccount the
# cluster permissions needed to reconcile tenant namespaces and run workloads.
#
# Default backend note:
# - `backend: sandbox-cr` is the plugin default and requires the
#   kubernetes-sigs/agent-sandbox controller/CRD to be installed separately:
#   https://github.com/kubernetes-sigs/agent-sandbox
# - Set `backend: job` if your cluster cannot install that alpha CRD.
#
# Optional CNI prerequisites for FQDN-based egress (`egressMode: cilium`):
# - Cilium >= 1.11 with DNS proxy enabled
# - cilium.io/v2 CiliumNetworkPolicy CRD
apiVersion: v1
kind: Namespace
metadata:
  name: paperclip
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paperclip-kubernetes-plugin
  namespace: paperclip
  labels:
    app.kubernetes.io/name: paperclip-kubernetes-plugin
    paperclip.io/managed-by: paperclip-k8s-plugin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paperclip-kubernetes-plugin
  labels:
    app.kubernetes.io/name: paperclip-kubernetes-plugin
    paperclip.io/managed-by: paperclip-k8s-plugin
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources:
      - "configmaps"
      - "limitranges"
      - "pods"
      - "resourcequotas"
      - "secrets"
      - "serviceaccounts"
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paperclip-kubernetes-plugin
  labels:
    app.kubernetes.io/name: paperclip-kubernetes-plugin
    paperclip.io/managed-by: paperclip-k8s-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paperclip-kubernetes-plugin
subjects:
  - kind: ServiceAccount
    name: paperclip-kubernetes-plugin
    namespace: paperclip
